name: Invite System Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allow manual triggers

jobs:
  invite-tests:
    name: Full Invite System Test Suite
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local instance
        run: |
          supabase start
          
      - name: Export Supabase credentials
        id: supabase
        run: |
          # Parse supabase status JSON output
          STATUS=$(supabase status --output json)
          
          # Extract values using jq
          API_URL=$(echo "$STATUS" | jq -r '.API_URL')
          ANON_KEY=$(echo "$STATUS" | jq -r '.ANON_KEY')
          SERVICE_ROLE_KEY=$(echo "$STATUS" | jq -r '.SERVICE_ROLE_KEY')
          
          # Export to GITHUB_ENV for subsequent steps
          echo "VITE_SUPABASE_URL=$API_URL" >> $GITHUB_ENV
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=$ANON_KEY" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> $GITHUB_ENV
          
          # Deterministic test org ID from seed.sql
          echo "VITE_TEST_ORG_ID=11111111-1111-1111-1111-111111111111" >> $GITHUB_ENV
          
          # Log for debugging (without exposing secrets)
          echo "✅ Supabase credentials exported"
          echo "   API URL: $API_URL"
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        env:
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_BUILD_ID: ${{ github.sha }}-${{ github.run_number }}
          VITE_BUILD_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
        run: npm run build
        
      - name: Run Full Invite Test Suite
        env:
          # Test Configuration
          VITE_RUN_TEST_LEVEL: "full"
          VITE_DISABLE_EMAIL_DELIVERY_FOR_TESTS: "true"
          VITE_ANALYTICS_EXCLUDE_ORGS: '["11111111-1111-1111-1111-111111111111"]'
          
          # Supabase Configuration (from GITHUB_ENV)
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_TEST_ORG_ID: ${{ env.VITE_TEST_ORG_ID }}
          
        run: node scripts/run-invite-tests.js --mode=full

      - name: Stop Supabase
        if: always()
        run: supabase stop
        
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: invite-test-results
          path: test-results/
          retention-days: 30
          
      - name: Comment PR with test results
        uses: actions/github-script@v6
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            try {
              const results = JSON.parse(fs.readFileSync('test-results/invite-tests.json', 'utf8'));
              const passed = results.every(suite => suite.passed);
              const passedCount = results.filter(s => s.passed).length;
              const totalCount = results.length;
              
              const status = passed ? '✅ PASSED' : '❌ FAILED';
              const summary = `${passedCount}/${totalCount} test suites passed`;
              
              const body = `## 🔒 Invite System Test Results ${status}
              
              **Summary:** ${summary}
              
              ${results.map(suite => 
                `### ${suite.passed ? '✅' : '❌'} ${suite.suiteName}
                ${suite.summary}
                
                ${suite.results.map(test => 
                  `- ${test.passed ? '✅' : '❌'} ${test.testName}: ${test.message}`
                ).join('\n')}`
              ).join('\n\n')}
              `;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } catch (error) {
              console.log('Could not read test results:', error.message);
            }
