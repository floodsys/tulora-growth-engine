name: Invite System Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allow manual triggers

jobs:
  invite-tests:
    name: Full Invite System Test Suite
    runs-on: ubuntu-latest
    # Skip when required secrets are unavailable (forks / PRs without environment)
    if: ${{ github.event_name == 'workflow_dispatch' || vars.HAS_TESTING_ENV == 'true' || github.event_name == 'push' }}
    
    environment: testing # Use GitHub environment for secrets
    
    steps:
      - name: Check for required secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "⚠️ Skipping invite tests: required secrets (VITE_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY) are not configured."
            echo "To enable these tests, add the secrets to the 'testing' environment in your repo settings."
            echo "has_secrets=false" >> $GITHUB_OUTPUT
          else
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.check-secrets.outputs.has_secrets == 'true'
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        if: steps.check-secrets.outputs.has_secrets == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        if: steps.check-secrets.outputs.has_secrets == 'true'
        run: npm ci
        
      - name: Build application
        if: steps.check-secrets.outputs.has_secrets == 'true'
        env:
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_BUILD_ID: ${{ github.sha }}-${{ github.run_number }}
          VITE_BUILD_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
        run: npm run build
        
      - name: Run Full Invite Test Suite
        if: steps.check-secrets.outputs.has_secrets == 'true'
        env:
          # Test Configuration
          VITE_RUN_TEST_LEVEL: "full"
          VITE_TEST_ORG_ID: ${{ secrets.TEST_ORG_ID }}
          VITE_DISABLE_EMAIL_DELIVERY_FOR_TESTS: "true"
          VITE_ANALYTICS_EXCLUDE_ORGS: '["${{ secrets.TEST_ORG_ID }}"]'
          
          # Supabase Configuration
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          
          # Service Role for CI Testing
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          
        run: node scripts/run-invite-tests.js --mode=full
        
      - name: Ensure test-results directory exists
        if: always()
        run: mkdir -p test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: invite-test-results
          path: test-results/
          retention-days: 30
          if-no-files-found: ignore
          
      - name: Comment PR with test results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const fs = require('fs');
            try {
              const results = JSON.parse(fs.readFileSync('test-results/invite-tests.json', 'utf8'));
              const passed = results.every(suite => suite.passed);
              const passedCount = results.filter(s => s.passed).length;
              const totalCount = results.length;
              
              const status = passed ? '✅ PASSED' : '❌ FAILED';
              const summary = `${passedCount}/${totalCount} test suites passed`;
              
              const body = `## 🔒 Invite System Test Results ${status}
              
              **Summary:** ${summary}
              
              ${results.map(suite => 
                `### ${suite.passed ? '✅' : '❌'} ${suite.suiteName}
                ${suite.summary}
                
                ${suite.results.map(test => 
                  `- ${test.passed ? '✅' : '❌'} ${test.testName}: ${test.message}`
                ).join('\n')}`
              ).join('\n\n')}
              `;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } catch (error) {
              console.log('Could not read test results:', error.message);
            }
