# ---------------------------------------------------------------------------
# Invite System Tests — fully self-contained (local Supabase)
#
# This workflow starts a local Supabase stack inside the CI runner so that
# the invite lifecycle tests can run WITHOUT any production/staging secrets.
# All auth users, orgs, invitations, and memberships are ephemeral and
# created / destroyed by the test script itself.
#
# Security note: no GitHub Environments or repository secrets are referenced.
# ---------------------------------------------------------------------------
name: Invite System Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  invite-tests:
    name: Invite Lifecycle Tests (local Supabase)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Supabase local stack (with retry)
        run: bash scripts/ci-supabase-start-retry.sh "npx --yes supabase@2.76.6"

      - name: Export Supabase connection env vars
        id: sb
        run: |
          STATUS_JSON=$(npx --yes supabase@2.76.6 status -o json)
          echo "SUPABASE_URL=$(echo "$STATUS_JSON"     | jq -r '.API_URL')"            >> "$GITHUB_ENV"
          echo "SUPABASE_ANON_KEY=$(echo "$STATUS_JSON" | jq -r '.ANON_KEY')"           >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$(echo "$STATUS_JSON" | jq -r '.SERVICE_ROLE_KEY')" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run invite lifecycle tests (--mode=full)
        env:
          VITE_DISABLE_EMAIL_DELIVERY_FOR_TESTS: "true"
        run: node scripts/run-invite-tests.js --mode=full

      - name: Stop Supabase
        if: always()
        run: npx --yes supabase@2.76.6 stop --no-backup

      - name: Ensure test-results directory exists
        if: always()
        run: mkdir -p test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: invite-test-results
          path: test-results/
          retention-days: 30
          if-no-files-found: ignore

      - name: Comment PR with test results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const fs = require('fs');
            try {
              const results = JSON.parse(fs.readFileSync('test-results/invite-tests.json', 'utf8'));
              const passed = results.every(suite => suite.passed);
              const passedCount = results.filter(s => s.passed).length;
              const totalCount = results.length;

              const status = passed ? '✅ PASSED' : '❌ FAILED';
              const summary = `${passedCount}/${totalCount} test suites passed`;

              const body = `## 🔒 Invite System Test Results ${status}

              **Summary:** ${summary}

              ${results.map(suite =>
                `### ${suite.passed ? '✅' : '❌'} ${suite.suiteName}
                ${suite.summary}

                ${suite.results.map(test =>
                  `- ${test.passed ? '✅' : '❌'} ${test.testName}: ${test.message}`
                ).join('\n')}`
              ).join('\n\n')}
              `;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } catch (error) {
              console.log('Could not read test results:', error.message);
            }
