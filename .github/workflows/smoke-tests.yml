name: Production Smoke Tests

on:
  schedule:
    # Run smoke tests every 6 hours in production
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual triggers
  deployment_status: # Run after deployments

permissions:
  contents: read

jobs:
  smoke-tests:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    
    # Only run on successful deployments or manual triggers
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success')
    
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Discover production org UUID (TEMP)
        id: discover_org
        shell: bash
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: |
          set -euo pipefail
          REST="${VITE_SUPABASE_URL%/}/rest/v1"
          CANDIDATE=""

          # Try common table names; pick the first UUID found.
          for T in organizations orgs organization; do
            RESP="$(curl -sS \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              "${REST}/${T}?select=id&limit=1" || true)"

            ID="$(node -e "try{const d=JSON.parse(process.argv[1]);process.stdout.write((d&&d[0]&&d[0].id)||'')}catch(e){process.stdout.write('')}" "${RESP}")"

            if [[ "${ID}" =~ ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$ ]]; then
              CANDIDATE="${ID}"
              break
            fi
          done

          if [[ -z "${CANDIDATE}" ]]; then
            echo "::error::Could not discover an org UUID from PostgREST. Check table name and production data."
            exit 1
          fi

          echo "Discovered production org UUID: ${CANDIDATE}"
          echo "VITE_TEST_ORG_ID=${CANDIDATE}" >> "${GITHUB_ENV}"
          echo "discovered_org_id=${CANDIDATE}" >> "${GITHUB_OUTPUT}"

      - name: Run Production Smoke Tests
        env:
          # Smoke Test Configuration (Read-only)
          VITE_RUN_TEST_LEVEL: "smoke"
          VITE_TEST_ORG_ID: ${{ secrets.PROD_TEST_ORG_ID }}
          VITE_DISABLE_EMAIL_DELIVERY_FOR_TESTS: "true"
          VITE_ANALYTICS_EXCLUDE_ORGS: '["${{ secrets.PROD_TEST_ORG_ID }}"]'
          
          # Production Supabase Configuration
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          
          # Read-only access for smoke tests
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          
        run: node scripts/run-invite-tests.js --mode=smoke
        
      - name: Upload smoke test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: test-results/
          retention-days: 7

      # NOTE: Issue creation on failure has been moved to the follow-up workflow
      # (.github/workflows/production-smoke-tests-followup.yml) which uses
      # workflow_run trigger to avoid "Resource not accessible by integration"
      # errors with deployment_status events.
