name: Production Smoke Tests

on:
  schedule:
    # Run smoke tests every 6 hours in production
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual triggers
  deployment_status: # Run after deployments

jobs:
  smoke-tests:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    
    # Only run on successful deployments or manual triggers
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local instance
        run: |
          supabase start
          
      - name: Export Supabase credentials
        id: supabase
        run: |
          # Parse supabase status JSON output
          STATUS=$(supabase status --output json)
          
          # Extract values using jq
          API_URL=$(echo "$STATUS" | jq -r '.API_URL')
          ANON_KEY=$(echo "$STATUS" | jq -r '.ANON_KEY')
          SERVICE_ROLE_KEY=$(echo "$STATUS" | jq -r '.SERVICE_ROLE_KEY')
          
          # Export to GITHUB_ENV for subsequent steps
          echo "VITE_SUPABASE_URL=$API_URL" >> $GITHUB_ENV
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=$ANON_KEY" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> $GITHUB_ENV
          
          # Deterministic test org ID from seed.sql
          echo "VITE_TEST_ORG_ID=11111111-1111-1111-1111-111111111111" >> $GITHUB_ENV
          
          # Log for debugging (without exposing secrets)
          echo "✅ Supabase credentials exported"
          echo "   API URL: $API_URL"
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Production Smoke Tests
        env:
          # Smoke Test Configuration (Read-only)
          VITE_RUN_TEST_LEVEL: "smoke"
          VITE_DISABLE_EMAIL_DELIVERY_FOR_TESTS: "true"
          VITE_ANALYTICS_EXCLUDE_ORGS: '["11111111-1111-1111-1111-111111111111"]'
          
          # Supabase Configuration (from GITHUB_ENV)
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_TEST_ORG_ID: ${{ env.VITE_TEST_ORG_ID }}
          
        run: node scripts/run-invite-tests.js --mode=smoke

      - name: Stop Supabase
        if: always()
        run: supabase stop
        
      - name: Upload smoke test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: test-results/
          retention-days: 7
          
      - name: Notify on smoke test failure
        uses: actions/github-script@v6
        if: failure()
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            try {
              const results = JSON.parse(fs.readFileSync('test-results/invite-tests.json', 'utf8'));
              const failedTests = results.filter(suite => !suite.passed);
              
              const body = `## 🚨 Production Smoke Tests Failed
              
              **Failed Test Suites:** ${failedTests.length}/${results.length}
              
              ${failedTests.map(suite => 
                `### ❌ ${suite.suiteName}
                ${suite.summary}
                
                **Failed Tests:**
                ${suite.results.filter(test => !test.passed).map(test => 
                  `- ${test.testName}: ${test.message}`
                ).join('\n')}`
              ).join('\n\n')}
              
              **Action Required:** Investigate production environment issues.
              `;
              
              // Create an issue for failed smoke tests
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 Production Smoke Tests Failed - ${new Date().toISOString().split('T')[0]}`,
                body: body,
                labels: ['bug', 'production', 'smoke-test-failure']
              });
            } catch (error) {
              console.log('Could not create issue for smoke test failure:', error.message);
              
              // Fallback notification
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 Production Smoke Tests Failed - ${new Date().toISOString().split('T')[0]}`,
                body: 'Production smoke tests failed but could not read detailed results. Please check the workflow logs.',
                labels: ['bug', 'production', 'smoke-test-failure']
              });
            }
