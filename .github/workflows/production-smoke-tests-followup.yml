name: "Production Smoke Tests – Follow-up"

# Triggered automatically when the "Production Smoke Tests" workflow completes.
# This separate workflow has its own GITHUB_TOKEN with write permissions,
# avoiding the "Resource not accessible by integration" error that occurs
# when deployment_status events try to create issues.
on:
  workflow_run:
    workflows: ["Production Smoke Tests"]
    types: [completed]

permissions:
  contents: read
  issues: write
  actions: read        # needed to list / download artifacts

jobs:
  open-issue-on-failure:
    name: Create / Update Failure Issue
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}

    steps:
      # ------------------------------------------------------------------ #
      # 1. Try to download the smoke-test-results artifact from Workflow A  #
      # ------------------------------------------------------------------ #
      - name: Download smoke-test-results artifact
        id: download
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // List artifacts for the triggering run
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });

            const match = artifacts.data.artifacts.find(a => a.name === 'smoke-test-results');
            if (!match) {
              core.setOutput('found', 'false');
              return;
            }

            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: match.id,
              archive_format: 'zip',
            });

            const artifactDir = 'smoke-test-results';
            fs.mkdirSync(artifactDir, { recursive: true });
            const zipPath = path.join(artifactDir, 'results.zip');
            fs.writeFileSync(zipPath, Buffer.from(download.data));
            core.setOutput('found', 'true');
            core.setOutput('zip_path', zipPath);

      - name: Unzip artifact
        if: steps.download.outputs.found == 'true'
        run: |
          cd smoke-test-results
          unzip -o results.zip || true
          ls -la

      # ------------------------------------------------------------------ #
      # 2. Build the issue body                                             #
      # ------------------------------------------------------------------ #
      - name: Build issue body
        id: body
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const run = context.payload.workflow_run;

            let details = '';
            try {
              const raw = fs.readFileSync('smoke-test-results/invite-tests.json', 'utf8');
              const results = JSON.parse(raw);
              const failed = results.filter(s => !s.passed);
              details = `**Failed suites:** ${failed.length} / ${results.length}\n\n`;
              for (const suite of failed) {
                details += `### ❌ ${suite.suiteName}\n${suite.summary || ''}\n`;
                const failedTests = (suite.results || []).filter(t => !t.passed);
                for (const t of failedTests) {
                  details += `- **${t.testName}** – ${t.message}\n`;
                }
                details += '\n';
              }
            } catch {
              details = '_Could not parse test-results artifact – check the workflow logs for details._\n';
            }

            const body = [
              `## 🚨 Production Smoke Tests Failed`,
              '',
              `| Field | Value |`,
              `|-------|-------|`,
              `| **Run** | [${run.id}](${run.html_url}) |`,
              `| **Conclusion** | \`${run.conclusion}\` |`,
              `| **Head SHA** | \`${run.head_sha}\` |`,
              `| **Branch** | \`${run.head_branch}\` |`,
              `| **Triggered at** | ${run.created_at} |`,
              '',
              `### Test Details`,
              '',
              details,
              '',
              `> **Artifacts:** Download the \`smoke-test-results\` artifact from the [workflow run](${run.html_url}) for full logs.`,
              '',
              `---`,
              `_Auto-generated by the Production Smoke Tests follow-up workflow._`,
            ].join('\n');

            core.setOutput('body', body);

      # ------------------------------------------------------------------ #
      # 3. Create or update a single stable issue                           #
      # ------------------------------------------------------------------ #
      - name: Create or update GitHub issue
        uses: actions/github-script@v7
        with:
          script: |
            const issueTitle = '🚨 Production Smoke Tests Failing';
            const labels = ['bug', 'production', 'smoke-test-failure'];

            // Look for an existing open issue with the same title
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: labels.join(','),
              per_page: 100,
            });

            const existing = issues.find(i => i.title === issueTitle);
            const body = `${{ steps.body.outputs.body }}`;

            if (existing) {
              // Update the existing issue with the latest failure info
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body,
              });

              // Also leave a comment so the timeline shows each occurrence
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `🔁 **Smoke tests failed again** – [Run ${{ github.event.workflow_run.id }}](${{ github.event.workflow_run.html_url }}) at \`${{ github.event.workflow_run.head_sha }}\`.`,
              });

              core.info(`Updated existing issue #${existing.number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: body,
                labels: labels,
              });
              core.info(`Created new issue #${created.number}`);
            }
