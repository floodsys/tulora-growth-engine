name: Secret Scanning

on:
  push:
    branches: [ main, develop, release/* ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  gitleaks:
    name: Detect Secrets with Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Optional for extended features
          GITLEAKS_CONFIG: gitleaks.toml

      - name: Upload Gitleaks Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: gitleaks-report
          path: results.sarif
          retention-days: 30

      - name: Post Summary on Failure
        if: failure()
        run: |
          echo "## 🚨 Secret Detection Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ❌ Secrets detected in repository!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Action Required:" >> $GITHUB_STEP_SUMMARY
          echo "1. Review the Gitleaks report artifact" >> $GITHUB_STEP_SUMMARY
          echo "2. Rotate any exposed credentials immediately" >> $GITHUB_STEP_SUMMARY
          echo "3. Remove secrets from code and git history" >> $GITHUB_STEP_SUMMARY
          echo "4. Use environment variables or secret managers instead" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See [SECURITY.md](./SECURITY.md) for security best practices." >> $GITHUB_STEP_SUMMARY

      - name: Post Summary on Success
        if: success()
        run: |
          echo "## ✅ Secret Scanning Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No secrets detected in the codebase." >> $GITHUB_STEP_SUMMARY
