name: Gitleaks Secret Scan

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/gitleaks/gitleaks:v8.30.0
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run gitleaks (working-tree only)
        run: >
          gitleaks detect
          --source "${{ github.workspace }}"
          --no-git
          --redact
          --report-format json
          --report-path "${{ github.workspace }}/gitleaks-report.json"

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: ${{ github.workspace }}/gitleaks-report.json
          if-no-files-found: ignore
          retention-days: 30
